<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding: 16px;
            min-height: 100vh;
            overflow-y: auto;
        }
        header {
            margin-top: 15px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #212121;
            padding: 10px 20px;
            height: 56px;
            border: 1px solid #303030;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .logo {
            color: #ff0000;
            font-weight: bold;
            font-size: 18px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            white-space: nowrap;
        }
        .logo span {
            color: #ffffff;
        }
        .search-container {
            display: flex;
            flex: 1;
            max-width: 400px;
            margin: 0 20px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 20px 0 0 20px;
            padding: 4px 16px;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 14px;
        }
        .search-btn {
            background: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 20px 20px 0;
            color: #aaa;
            padding: 0 16px;
            cursor: pointer;
            font-size: 14px;
        }
        .content-area {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .video-card {
            background: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #282828;
            width: 100%;
        }
        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }
        .video-thumbnail iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .video-info {
            padding: 14px 16px;
            font-size: 13px;
            color: #aaa;
        }
        .video-title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 6px;
            font-size: 15px;
            line-height: 1.4;
        }
        .search-info {
            padding: 12px 16px;
            font-size: 14px;
            color: #aaa;
            background: #181818;
            border: 1px solid #282828;
            border-radius: 12px;
        }
        .external-search-box {
            background: #1f1f1f;
            border: 1px solid #303030;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
        }
        .yt-link-btn {
            display: inline-block;
            background-color: #ff0000;
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="resetHome()">▶ YT <span>RP</span></div>
        <div style="display:flex; flex:1; justify-content:center;">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Video-ID, Link oder Suchbegriff..." onkeypress="checkEnter(event)">
            </div>
            <button class="search-btn" onclick="searchVideo()">🔍</button>
        </div>
        <div style="width: 70px;"></div>
    </header>

    <div id="contentArea" class="content-area">
        <div class="video-card">
            <div class="video-thumbnail">
                <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <div class="video-title">WICHTIGES UPDATE - L.S. News</div>
                <div>Vor 2 Stunden • 12.4K Aufrufe</div>
            </div>
        </div>
    </div>

    <script>
        function checkEnter(e) {
            if (e.key === 'Enter') {
                searchVideo();
            }
        }

        function searchVideo() {
            let query = document.getElementById('searchInput').value.trim();
            if(!query) return;

            let contentArea = document.getElementById('contentArea');
            let videoId = extractVideoId(query);
            let playlistId = extractPlaylistId(query);

            if (videoId) {
                contentArea.innerHTML = `
                    <div class="search-info">Videowiedergabe</div>
                    <div class="video-card">
                        <div class="video-thumbnail">
                            <iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">Wiedergabe</div>
                            <div>Gespielt über YouTube RP</div>
                        </div>
                    </div>
                `;
            } else if (playlistId) {
                contentArea.innerHTML = `
                    <div class="search-info">Playlist-Wiedergabe</div>
                    <div class="video-card">
                        <div class="video-thumbnail" style="height: 480px;">
                            <iframe src="https://www.youtube-nocookie.com/embed/videoseries?list=${playlistId}&autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%; height:100%;"></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">Playlist / Kanal-Videos</div>
                            <div>Videos laufen nacheinander</div>
                        </div>
                    </div>
                `;
            } else {
                let encodedQuery = encodeURIComponent(query);
                contentArea.innerHTML = `
                    <div class="search-info">Suchergebnisse</div>
                    <div class="external-search-box">
                        <p style="margin: 0 0 10px 0; font-size: 16px; color: #fff;">Suche nach: <strong>"${query}"</strong></p>
                        <p style="margin: 0 0 20px 0; font-size: 13px; color: #aaa;">YouTube lässt direkte Suchlisten im Browser nicht mehr per iFrame zu. Klicke hier, um die Ergebnisse direkt zu öffnen und Videos zu finden:</p>
                        <a href="https://www.youtube.com/results?search_query=${encodedQuery}" target="_blank" class="yt-link-btn">Auf YouTube suchen & abspielen</a>
                    </div>
                `;
            }
        }

        function extractVideoId(urlOrId) {
            if (/^[a-zA-Z0-9_-]{11}$/.test(urlOrId)) {
                return urlOrId;
            }
            let match = urlOrId.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
            return match ? match[1] : null;
        }

        function extractPlaylistId(urlOrId) {
            if (/^(PL|UU|RD|FL|TL|LL)[a-zA-Z0-9_-]+$/.test(urlOrId)) {
                return urlOrId;
            }
            let match = urlOrId.match(/[?&]list=([a-zA-Z0-9_-]+)/);
            return match ? match[1] : null;
        }

        function resetHome() {
            document.getElementById('searchInput').value = '';
            document.getElementById('contentArea').innerHTML = `
                <div class="video-card">
                    <div class="video-thumbnail">
                        <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <div class="video-title">WICHTIGES UPDATE - L.S. News</div>
                        <div>Vor 2 Stunden • 12.4K Aufrufe</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
