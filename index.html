<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google</title>
    <style>
        body {
            background-color: #202124;
            color: #e8eaed;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .logo {
            font-size: 52px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: -2px;
            user-select: none;
        }
        .logo span:nth-child(1) { color: #4285F4; }
        .logo span:nth-child(2) { color: #EA4335; }
        .logo span:nth-child(3) { color: #FBBC05; }
        .logo span:nth-child(4) { color: #4285F4; }
        .logo span:nth-child(5) { color: #34A853; }
        .logo span:nth-child(6) { color: #EA4335; }
        
        .search-box {
            display: flex;
            align-items: center;
            background: #303134;
            border: 1px solid #5f6368;
            border-radius: 28px;
            width: 90%;
            max-width: 450px;
            height: 48px;
            padding: 0 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 16px;
            outline: none;
        }
        button {
            background: transparent;
            border: none;
            color: #8ab4f8;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
        }
    </style>
</head>
<body>
    <div class="logo">
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </div>
    
    <!-- Wir nutzen einen stabilen Such-Endpoint, der im Handy-Frame nicht abstürzt -->
    <form action="https://lite.duckduckgo.com/lite/" method="GET" class="search-box">
        <input type="text" name="q" placeholder="Google Suche..." autocomplete="off" required>
        <button type="submit">Suchen</button>
    </form>
</body>
</html>
