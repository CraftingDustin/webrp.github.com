<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding: 10px;
            height: 100vh;
            overflow-y: auto;
        }
        header {
            margin-top: 62px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #212121;
            padding: 8px 12px;
            height: 48px;
            border: 1px solid #303030;
            border-radius: 12px;
            margin-bottom: 15px;
        }
        .logo {
            color: #ff0000;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            white-space: nowrap;
        }
        .logo span {
            color: #ffffff;
        }
        .search-container {
            display: flex;
            flex: 1;
            max-width: 170px;
            margin: 0 8px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 16px 0 0 16px;
            padding: 2px 10px;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 12px;
        }
        .search-btn {
            background: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 16px 16px 0;
            color: #aaa;
            padding: 0 8px;
            cursor: pointer;
            font-size: 12px;
        }
        .video-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .video-card {
            background: #1f1f1f;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #282828;
            width: 100%;
        }
        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }
        .video-thumbnail iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .video-info {
            padding: 10px 12px;
            font-size: 12px;
            color: #aaa;
        }
        .video-title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 4px;
            font-size: 13px;
            line-height: 1.3;
        }
        .search-info {
            padding: 10px 12px;
            font-size: 13px;
            color: #aaa;
            background: #181818;
            border: 1px solid #282828;
            border-radius: 12px;
            margin-bottom: 10px;
        }
        .external-search-box {
            background: #1f1f1f;
            border: 1px solid #303030;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }
        .yt-link-btn {
            display: inline-block;
            background-color: #ff0000;
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="resetHome()">▶ YT <span>RP</span></div>
        <div style="display:flex; flex:1; justify-content:flex-end;">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Video-ID, Link oder Playlist..." onkeypress="checkEnter(event)">
            </div>
            <button class="search-btn" onclick="searchVideo()">🔍</button>
        </div>
    </header>

    <div id="contentArea" class="video-grid">
        <div class="video-card">
            <div class="video-thumbnail">
                <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <div class="video-title">WICHTIGES UPDATE - L.S. News</div>
                <div>Vor 2 Stunden • 12.4K Aufrufe</div>
            </div>
        </div>
    </div>

    <script>
        function checkEnter(e) {
            if (e.key === 'Enter') {
                searchVideo();
            }
        }

        function searchVideo() {
            let query = document.getElementById('searchInput').value.trim();
            if(!query) return;

            let contentArea = document.getElementById('contentArea');
            let videoId = extractVideoId(query);
            let playlistId = extractPlaylistId(query);

            if (videoId) {
                // Einzelnes Video abspielen
                contentArea.innerHTML = `
                    <div class="search-info">Videowiedergabe</div>
                    <div class="video-card">
                        <div class="video-thumbnail">
                            <iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">Wiedergabe</div>
                            <div>Gespielt über YouTube RP</div>
                        </div>
                    </div>
                `;
            } else if (playlistId) {
                // Ganze Playlist / Kanal-Videos direkt als Liste anzeigen
                contentArea.innerHTML = `
                    <div class="search-info">Kanal- / Playlist-Übersicht</div>
                    <div class="video-card">
                        <div class="video-thumbnail" style="height: 380px;">
                            <iframe src="https://www.youtube-nocookie.com/embed/videoseries?list=${playlistId}&autoplay=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen style="width:100%; height:100%;"></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">Alle Videos der Playlist/des Kanals</div>
                            <div>Durchklickbar über den Player</div>
                        </div>
                    </div>
                `;
            } else {
                // Fallback für normale Suchbegriffe (mit Weiterleitung zur Sicherheit)
                let encodedQuery = encodeURIComponent(query);
                contentArea.innerHTML = `
                    <div class="search-info">Suche</div>
                    <div class="external-search-box">
                        <p style="margin: 0 0 10px 0; font-size: 14px; color: #fff;">Suchbegriff: <strong>"${query}"</strong></p>
                        <p style="margin: 0 0 15px 0; font-size: 12px; color: #aaa;">Füge einen Videolink, eine Video-ID oder eine Playlist-ID (z.B. Beginn mit <code>PL...</code>) ein, um die Videos direkt anzuzeigen.</p>
                        <a href="https://www.youtube.com/results?search_query=${encodedQuery}" target="_blank" class="yt-link-btn">Auf YouTube suchen</a>
                    </div>
                `;
            }
        }

        function extractVideoId(urlOrId) {
            if (/^[a-zA-Z0-9_-]{11}$/.test(urlOrId)) {
                return urlOrId;
            }
            let match = urlOrId.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
            return match ? match[1] : null;
        }

        function extractPlaylistId(urlOrId) {
            // Erkennt direkte Playlist-IDs (starten oft mit PL, UU, RD etc.) oder Links mit ?list=...
            if (/^(PL|UU|RD|FL|TL|LL)[a-zA-Z0-9_-]+$/.test(urlOrId)) {
                return urlOrId;
            }
            let match = urlOrId.match(/[?&]list=([a-zA-Z0-9_-]+)/);
            return match ? match[1] : null;
        }

        function resetHome() {
            document.getElementById('searchInput').value = '';
            document.getElementById('contentArea').innerHTML = `
                <div class="video-card">
                    <div class="video-thumbnail">
                        <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <div class="video-title">WICHTIGES UPDATE - L.S. News</div>
                        <div>Vor 2 Stunden • 12.4K Aufrufe</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
