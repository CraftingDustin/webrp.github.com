<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: Roboto, Arial, sans-serif;
            margin: 0;
            padding: 55px 0 0 0;
            height: 100vh;
            overflow-y: auto;
        }
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background-color: #212121;
            padding: 8px 12px;
            height: 48px;
            z-index: 100;
            border-bottom: 1px solid #303030;
        }
        .logo {
            color: #ff0000;
            font-weight: bold;
            font-size: 15px;
            letter-spacing: -1px;
            display: flex;
            align-items: center;
            gap: 3px;
            cursor: pointer;
            white-space: nowrap;
        }
        .logo span {
            color: #ffffff;
        }
        .search-container {
            display: flex;
            flex: 1;
            max-width: 220px;
            margin: 0 8px;
            background: #121212;
            border: 1px solid #303030;
            border-radius: 18px 0 0 18px;
            padding: 3px 10px;
        }
        input {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            outline: none;
            font-size: 12px;
        }
        .search-btn {
            background: #222;
            border: 1px solid #303030;
            border-left: none;
            border-radius: 0 18px 18px 0;
            color: #aaa;
            padding: 0 10px;
            cursor: pointer;
            font-size: 12px;
        }
        .video-grid {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .video-card {
            background: #1f1f1f;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #282828;
            width: 100%;
        }
        .video-thumbnail {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            position: relative;
        }
        .video-thumbnail iframe {
            width: 100%;
            height: 100%;
            border: none;
            position: absolute;
            top: 0;
            left: 0;
        }
        .video-info {
            padding: 8px 10px;
            font-size: 12px;
            color: #aaa;
        }
        .video-title {
            color: #fff;
            font-weight: bold;
            margin-bottom: 3px;
            font-size: 13px;
            line-height: 1.3;
        }
        .search-info {
            padding: 8px 12px;
            font-size: 13px;
            color: #aaa;
            background: #181818;
            border-bottom: 1px solid #282828;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="resetHome()">▶ YT <span>RP</span></div>
        <div style="display:flex; flex:1; justify-content:flex-end;">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Video-Name oder Link..." onkeypress="checkEnter(event)">
            </div>
            <button class="search-btn" onclick="searchVideo()">🔍</button>
        </div>
    </header>

    <div id="contentArea" class="video-grid">
        <div class="video-card">
            <div class="video-thumbnail">
                <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
            <div class="video-info">
                <div class="video-title">WICHTIGES UPDATE - L.S. News</div>
                <div>Vor 2 Stunden • 12.4K Aufrufe</div>
            </div>
        </div>
    </div>

    <script>
        function checkEnter(e) {
            if (e.key === 'Enter') {
                searchVideo();
            }
        }

        function searchVideo() {
            let query = document.getElementById('searchInput').value.trim();
            if(!query) return;

            let contentArea = document.getElementById('contentArea');
            let videoId = extractVideoId(query);

            if (videoId) {
                // Direkte Video-ID oder Link
                contentArea.innerHTML = `
                    <div class="search-info">Videowiedergabe</div>
                    <div class="video-card">
                        <div class="video-thumbnail">
                            <iframe src="https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">Direktes Video</div>
                            <div>Gespielt über YouTube RP</div>
                        </div>
                    </div>
                `;
            } else {
                // Suchbegriff als Video-Playlist übergeben, um den "Video nicht gefunden"-Fehler zu verhindern
                let encodedQuery = encodeURIComponent(query + " official music video trailer");
                contentArea.innerHTML = `
                    <div class="search-info">Suche: "${query}"</div>
                    <div class="video-card">
                        <div class="video-thumbnail">
                            <iframe src="https://www.youtube-nocookie.com/embed?listType=search&list=${encodedQuery}&autoplay=1&controls=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                        </div>
                        <div class="video-info">
                            <div class="video-title">Ergebnisse für: ${query}</div>
                            <div>YouTube Wiedergabe</div>
                        </div>
                    </div>
                `;
            }
        }

        function extractVideoId(urlOrId) {
            if (/^[a-zA-Z0-9_-]{11}$/.test(urlOrId)) {
                return urlOrId;
            }
            let match = urlOrId.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([\w-]{11})/);
            return match ? match[1] : null;
        }

        function resetHome() {
            document.getElementById('searchInput').value = '';
            document.getElementById('contentArea').innerHTML = `
                <div class="video-card">
                    <div class="video-thumbnail">
                        <iframe src="https://www.youtube-nocookie.com/embed/dQw4w9WgXcQ?autoplay=0&controls=1&modestbranding=1&playsinline=1" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                    </div>
                    <div class="video-info">
                        <div class="video-title">WICHTIGES UPDATE - L.S. News</div>
                        <div>Vor 2 Stunden • 12.4K Aufrufe</div>
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
