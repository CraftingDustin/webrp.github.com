<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Google</title>
    <style>
        body {
            background-color: #202124; /* Fester dunkler Hintergrund, damit es nicht transparent wird */
            color: #e8eaed;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        h1 {
            font-size: 48px;
            margin-bottom: 25px;
            letter-spacing: -2px;
        }
        h1 span:nth-child(1) { color: #4285F4; }
        h1 span:nth-child(2) { color: #EA4335; }
        h1 span:nth-child(3) { color: #FBBC05; }
        h1 span:nth-child(4) { color: #4285F4; }
        h1 span:nth-child(5) { color: #34A853; }
        h1 span:nth-child(6) { color: #EA4335; }
        
        form {
            display: flex;
            background: #303134;
            border: 1px solid #5f6368;
            border-radius: 24px;
            width: 85%;
            max-width: 400px;
            height: 46px;
            padding: 0 15px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
        }
        input {
            flex: 1;
            background: transparent;
            border: none;
            color: #e8eaed;
            font-size: 16px;
            outline: none;
        }
        button {
            background: transparent;
            border: none;
            color: #8ab4f8;
            font-weight: bold;
            cursor: pointer;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>
        <span>G</span><span>o</span><span>o</span><span>g</span><span>l</span><span>e</span>
    </h1>
    <!-- Leitet die Suche auf eine kompatible Zielseite um -->
    <form action="https://html.duckduckgo.com/html/" method="GET">
        <input type="text" name="q" placeholder="Google Suche..." autocomplete="off" required>
        <button type="submit">Suchen</button>
    </form>
</body>
</html>
